<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Implant Scanner</title>

<style>
body { font-family: system-ui; margin:16px; }
.row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
button { padding:10px 14px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer; }
input { padding:10px; border-radius:10px; border:1px solid #ddd; width:90px; }
video { width:min(480px,100%); border-radius:12px; background:black; margin-top:10px; }

.badge.big {
  font-size:26px;
  padding:12px 20px;
  border-radius:999px;
  font-weight:800;
  display:inline-block;
  margin-top:8px;
}

.ok  { background:#eaffea; color:#0a5a0a; border:1px solid #bfe9bf; }
.bad { background:#ffe3e3; color:#7a0b0b; border:1px solid #f0b3b3; }
.unk { background:#eee; color:#333; border:1px solid #ddd; }

table { width:100%; border-collapse:collapse; margin-top:15px; font-size:12px; }
th,td { border-bottom:1px solid #eee; padding:6px; text-align:left; }

/* Toast */
#toast {
  position:fixed;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  color:white;
  padding:14px 20px;
  border-radius:14px;
  font-weight:800;
  font-size:16px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<h2>Implant Scanner</h2>

<div class="row">
  <label>Expiring threshold (months)</label>
  <input id="monthsInput" type="number" value="3" min="0" max="36">
  <button id="startBtn">Start scanner</button>
  <button id="stopBtn" disabled>Stop</button>
  <button id="exportBtn" disabled>Export CSV</button>
</div>

<video id="video" muted playsinline></video>

<div>
  <p>Type: <span id="lastType">–</span></p>
  <p>GTIN: <span id="lastGtin">–</span></p>
  <p>Expiry: <span id="lastExpiry">–</span></p>
  <div>Status:</div>
  <span id="lastStatus" class="badge big unk">–</span>
</div>

<table>
<thead>
<tr>
<th>Timestamp</th>
<th>Type</th>
<th>GTIN</th>
<th>Expiry</th>
<th>Status</th>
<th>Lot</th>
<th>Serial</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="toast">Artikel gescand, scan de volgende.</div>

<script src="https://unpkg.com/@zxing/library@0.21.3"></script>

<script>
(function(){

const {BrowserMultiFormatReader,BarcodeFormat,DecodeHintType} = ZXing;

const reader = new BrowserMultiFormatReader(new Map([
  [DecodeHintType.POSSIBLE_FORMATS,[
    BarcodeFormat.EAN_13,
    BarcodeFormat.EAN_8,
    BarcodeFormat.CODE_128,
    BarcodeFormat.DATA_MATRIX,
    BarcodeFormat.QR_CODE,
    BarcodeFormat.PDF_417,
    BarcodeFormat.AZTEC
  ]]
]));

const startBtn=document.getElementById("startBtn");
const stopBtn=document.getElementById("stopBtn");
const exportBtn=document.getElementById("exportBtn");
const monthsInput=document.getElementById("monthsInput");
const video=document.getElementById("video");
const tbody=document.getElementById("tbody");

const lastType=document.getElementById("lastType");
const lastGtin=document.getElementById("lastGtin");
const lastExpiry=document.getElementById("lastExpiry");
const lastStatus=document.getElementById("lastStatus");

const scanLog=[];
let scanning=false;

function showToast(){
  const t=document.getElementById("toast");
  t.style.display="block";
  if(navigator.vibrate) navigator.vibrate(100);
  clearTimeout(window.toastTimer);
  window.toastTimer=setTimeout(()=>{t.style.display="none"},1000);
}

function classify(exp){
  if(!exp) return "UNKNOWN";
  const today=new Date(); today.setHours(0,0,0,0);
  const expDate=new Date(exp); expDate.setHours(0,0,0,0);
  if(expDate<today) return "EXPIRED";
  const limit=new Date(today);
  limit.setMonth(limit.getMonth()+parseInt(monthsInput.value||0));
  if(expDate<=limit) return "EXPIRING";
  return "OK";
}

function setBadge(status){
  lastStatus.textContent=status;
  lastStatus.className="badge big "+(status==="OK"?"ok":"bad");
}

function toISO(d){
  if(!d) return "";
  return d.toISOString().slice(0,10);
}

function parseGs1(raw){
  const gtinMatch=raw.match(/01(\d{14})/);
  const expMatch=raw.match(/17(\d{6})/);
  const lotMatch=raw.match(/10([^\u001d]+)/);
  const serialMatch=raw.match(/21([^\u001d]+)/);

  let expiry=null;
  if(expMatch){
    const y=2000+parseInt(expMatch[1].slice(0,2));
    const m=parseInt(expMatch[1].slice(2,4))-1;
    const d=parseInt(expMatch[1].slice(4,6));
    expiry=new Date(y,m,d);
  }

  return {
    gtin:gtinMatch?gtinMatch[1]:"",
    expiry,
    lot:lotMatch?lotMatch[1]:"",
    serial:serialMatch?serialMatch[1]:""
  };
}

startBtn.onclick=async()=>{
  if(scanning) return;
  scanning=true;
  startBtn.disabled=true;
  stopBtn.disabled=false;

  const devices=await reader.listVideoInputDevices();
  const deviceId=devices[0].deviceId;

  reader.decodeFromVideoDevice(deviceId,video,(result,err)=>{
    if(result){
      const raw=result.getText();
      const fmt=result.getBarcodeFormat().toString();
      let gtin="",expiry="",lot="",serial="",status="";

      if(fmt==="EAN_13"||fmt==="EAN_8"){
        gtin=raw;
        status="UNKNOWN";
      } else {
        const parsed=parseGs1(raw);
        gtin=parsed.gtin;
        expiry=toISO(parsed.expiry);
        lot=parsed.lot;
        serial=parsed.serial;
        status=classify(parsed.expiry);
      }

      lastType.textContent=fmt;
      lastGtin.textContent=gtin||"–";
      lastExpiry.textContent=expiry||"–";
      setBadge(status);

      const item={
        timestamp:new Date().toISOString(),
        type:fmt,
        gtin,
        expiry,
        status,
        lot,
        serial
      };

      scanLog.push(item);

      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td>${item.timestamp}</td>
        <td>${item.type}</td>
        <td>${item.gtin}</td>
        <td>${item.expiry}</td>
        <td>${item.status}</td>
        <td>${item.lot}</td>
        <td>${item.serial}</td>`;
      tbody.prepend(tr);

      exportBtn.disabled=false;
      showToast();
    }
  });
};

stopBtn.onclick=()=>{
  scanning=false;
  reader.reset();
  startBtn.disabled=false;
  stopBtn.disabled=true;
};

exportBtn.onclick=()=>{
  const header=["Timestamp","Type","GTIN","Expiry","Status","Lot","Serial"];
  const rows=scanLog.map(x=>header.map(h=>x[h.toLowerCase()]||x[h]||"").join(","));
  const csv=[header.join(","),...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="scanlog.csv";
  a.click();
};

})();
</script>

</body>
</html>
