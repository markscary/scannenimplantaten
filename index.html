<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scanner Diagnostic</title>
  <style>
    body { font-family: system-ui; margin: 16px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button { padding:10px 14px; border:1px solid #ddd; border-radius:10px; background:#fff; }
    video { width:min(520px,100%); background:#000; border-radius:12px; border:1px solid #ddd; margin-top:10px; }
    .card { border:1px solid #e5e5e5; border-radius:12px; padding:12px; margin-top:12px; }
    .k { font-weight:800; }
    pre { white-space: pre-wrap; word-break: break-word; background:#f7f7f7; padding:10px; border-radius:10px; border:1px solid #eee; }
    .ok { color: #0a5a0a; }
    .bad { color: #7a0b0b; }
  </style>
</head>
<body>
  <h2>Scanner Diagnostic (iPhone Safari)</h2>

  <div class="row">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <video id="video" muted playsinline></video>

  <div class="card">
    <div><span class="k">HTTPS:</span> <span id="httpsStatus">–</span></div>
    <div><span class="k">ZXing loaded:</span> <span id="zxingStatus">–</span></div>
    <div><span class="k">Camera stream:</span> <span id="camStatus">–</span></div>
    <div><span class="k">Last format:</span> <span id="lastFmt">–</span></div>
    <div><span class="k">Last text:</span></div>
    <pre id="lastText">–</pre>
    <div><span class="k">Errors:</span></div>
    <pre id="errors">–</pre>
  </div>

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@0.21.3"></script>

  <script>
  (function(){
    const startBtn = document.getElementById("startBtn");
    const stopBtn  = document.getElementById("stopBtn");
    const video    = document.getElementById("video");

    const httpsStatus = document.getElementById("httpsStatus");
    const zxingStatus = document.getElementById("zxingStatus");
    const camStatus   = document.getElementById("camStatus");
    const lastFmt     = document.getElementById("lastFmt");
    const lastText    = document.getElementById("lastText");
    const errorsEl    = document.getElementById("errors");

    function logErr(msg){
      const prev = errorsEl.textContent === "–" ? "" : (errorsEl.textContent + "\n");
      errorsEl.textContent = prev + msg;
    }

    httpsStatus.textContent = (location.protocol === "https:") ? "OK (https)" : "NOT HTTPS (will break camera)";
    httpsStatus.className = (location.protocol === "https:") ? "ok" : "bad";

    if (!window.ZXing) {
      zxingStatus.textContent = "NO (blocked?)";
      zxingStatus.className = "bad";
      logErr("ZXing not loaded. Try disabling content blockers / adblock. Also ensure internet access.");
      return;
    } else {
      zxingStatus.textContent = "YES";
      zxingStatus.className = "ok";
    }

    const { BrowserMultiFormatReader, DecodeHintType, BarcodeFormat } = window.ZXing;

    // Wide format list so EAN/QR/DataMatrix all have a chance
    const hints = new Map();
    hints.set(DecodeHintType.TRY_HARDER, true);
    hints.set(DecodeHintType.POSSIBLE_FORMATS, [
      BarcodeFormat.EAN_13,
      BarcodeFormat.EAN_8,
      BarcodeFormat.UPC_A,
      BarcodeFormat.UPC_E,
      BarcodeFormat.CODE_128,
      BarcodeFormat.CODE_39,
      BarcodeFormat.ITF,
      BarcodeFormat.DATA_MATRIX,
      BarcodeFormat.QR_CODE,
      BarcodeFormat.PDF_417,
      BarcodeFormat.AZTEC,
      BarcodeFormat.CODABAR
    ]);

    const reader = new BrowserMultiFormatReader(hints);
    let scanning = false;

async function start(){
  if (scanning) return;
  scanning = true;
  startBtn.disabled = true;
  stopBtn.disabled = false;
  errorsEl.textContent = "–";
  lastFmt.textContent = "–";
  lastText.textContent = "–";

  try {
    // 1) Start stream ourselves (works very reliably on iPhone)
    const constraints = {
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    };

    const stream = await navigator.mediaDevices.getUserMedia(constraints);
    camStatus.textContent = "OK";
    camStatus.className = "ok";

    video.srcObject = stream;
    await video.play();

    // 2) Now let ZXing decode from the playing video element continuously
    reader.decodeFromVideoElementContinuously(video, (result, err) => {
      if (!scanning) return;

      if (result) {
        lastFmt.textContent = result.getBarcodeFormat().toString();
        lastText.textContent = result.getText();
      } else if (err && err.name && err.name !== "NotFoundException") {
        logErr(err.name + ": " + (err.message || String(err)));
      }
    });

  } catch(e) {
    camStatus.textContent = "FAILED";
    camStatus.className = "bad";
    logErr("Start failed: " + (e && e.message ? e.message : String(e)));
    scanning = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
  }
}

   function stop(){
  scanning = false;
  startBtn.disabled = false;
  stopBtn.disabled = true;
  try { reader.reset(); } catch(e) {}

  // Stop camera stream
  const s = video.srcObject;
  if (s) s.getTracks().forEach(t => t.stop());
  video.srcObject = null;
}

    startBtn.addEventListener("click", start);
    stopBtn.addEventListener("click", stop);
  })();
  </script>
</body>
</html>
