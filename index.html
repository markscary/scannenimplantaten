<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Implant Scanner</title>
<style>
  body { font-family: system-ui; margin:16px; }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  button { padding:10px 14px; border-radius:10px; border:1px solid #ddd; background:#fff; cursor:pointer; }
  button:disabled { opacity:.6; cursor:not-allowed; }
  input[type="number"] { padding:10px; border-radius:10px; border:1px solid #ddd; width:160px; }
  input[type="range"] { width: 160px; }
  video { width:min(520px,100%); border-radius:12px; background:black; margin-top:10px; border:1px solid #ddd; }

  .badge.big { font-size:26px; padding:12px 20px; border-radius:999px; font-weight:900; display:inline-block; }
  .ok  { background:#eaffea; color:#0a5a0a; border:1px solid #bfe9bf; }
  .bad { background:#ffe3e3; color:#7a0b0b; border:1px solid #f0b3b3; }
  .unk { background:#eee; color:#333; border:1px solid #ddd; }

  table { width:100%; border-collapse:collapse; margin-top:15px; font-size:12px; }
  th,td { border-bottom:1px solid #eee; padding:6px; text-align:left; }

  #toast {
    position:fixed; left:50%; bottom:20px; transform:translateX(-50%);
    background:rgba(0,0,0,0.9); color:#fff; padding:14px 20px; border-radius:14px;
    font-weight:800; font-size:16px; display:none; z-index:9999; max-width:92vw; text-align:center;
  }
  .small { font-size:12px; color:#555; margin-top:6px; }
  .pill { display:inline-block; font-size:12px; padding:4px 10px; border:1px solid #ddd; border-radius:999px; background:#fafafa; }
</style>
</head>
<body>

<h2>Implant Scanner</h2>

<div class="row">
  <label>Expiring threshold (months)</label>
  <input id="monthsInput" type="number" value="3" min="0" max="36">
  <button id="startBtn">Start</button>
  <button id="stopBtn" disabled>Stop</button>
  <button id="exportBtn" disabled>Export CSV</button>
  <button id="clearBtn">Leegmaken</button>
</div>

<div class="row" style="margin-top:8px;">
  <button id="torchBtn" disabled>🔦 Torch</button>
  <div>
    <div class="small">Zoom</div>
    <input id="zoomSlider" type="range" min="1" max="1" step="0.1" value="1" disabled>
  </div>
  <span id="camInfo" class="pill">Camera: –</span>
</div>

<div class="small">
  Tip voor DataMatrix (dot matrix): hou <strong>stil</strong>, zorg voor <strong>veel licht</strong>, en zet de <strong>onderste</strong> barcode iets groter in beeld (net iets dichterbij).
</div>

<video id="video" muted playsinline></video>

<div style="margin-top:15px;">
  <div>GTIN: <span id="lastGtin">–</span></div>
  <div>Expiry: <span id="lastExpiry">–</span></div>
  <div>Lot: <span id="lastLot">–</span></div>
  <div>Serial: <span id="lastSerial">–</span></div>
  <div>Status:</div>
  <span id="lastStatus" class="badge big unk">–</span>
</div>

<table>
  <thead>
    <tr>
      <th>Timestamp</th><th>GTIN</th><th>Expiry</th><th>Status</th><th>Lot</th><th>Serial</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div id="toast">Artikel gescand, scan de volgende.</div>

<script src="https://unpkg.com/@zxing/library@0.21.3"></script>
<script>
(function(){
  const { BrowserMultiFormatReader, DecodeHintType, BarcodeFormat } = ZXing;

  // Try harder + assume GS1 helps for long GS1-128/Code128 variants
  const hints = new Map();
  hints.set(DecodeHintType.TRY_HARDER, true);
  hints.set(DecodeHintType.ASSUME_GS1, true);
  hints.set(DecodeHintType.POSSIBLE_FORMATS, [
    BarcodeFormat.EAN_13, BarcodeFormat.EAN_8,
    BarcodeFormat.UPC_A, BarcodeFormat.UPC_E,
    BarcodeFormat.CODE_128, BarcodeFormat.CODE_39, BarcodeFormat.ITF,
    BarcodeFormat.DATA_MATRIX, BarcodeFormat.QR_CODE,
    BarcodeFormat.PDF_417, BarcodeFormat.AZTEC, BarcodeFormat.CODABAR
  ]);

  const reader = new BrowserMultiFormatReader(hints);

  const video = document.getElementById("video");
  const startBtn = document.getElementById("startBtn");
  const stopBtn = document.getElementById("stopBtn");
  const exportBtn = document.getElementById("exportBtn");
  const clearBtn = document.getElementById("clearBtn");
  const monthsInput = document.getElementById("monthsInput");

  const torchBtn = document.getElementById("torchBtn");
  const zoomSlider = document.getElementById("zoomSlider");
  const camInfo = document.getElementById("camInfo");

  const lastGtin = document.getElementById("lastGtin");
  const lastExpiry = document.getElementById("lastExpiry");
  const lastLot = document.getElementById("lastLot");
  const lastSerial = document.getElementById("lastSerial");
  const lastStatus = document.getElementById("lastStatus");
  const tbody = document.getElementById("tbody");

  let scanning = false;
  let stream = null;
  let track = null;
  let torchOn = false;

  let scanLog = [];

  // capture window: wait for GTIN + details
  const CAPTURE_TIMEOUT_MS = 2200;
  let capture = null; // { gtin, expiry, lot, serial }
  let captureTimer = null;

  // reduce spam
  let lastRaw = null;
  let lastRawAt = 0;

  function showToast(msg){
    const t=document.getElementById("toast");
    t.textContent = msg || "Artikel gescand, scan de volgende.";
    t.style.display="block";
    if (navigator.vibrate) navigator.vibrate(80);
    clearTimeout(window.__toastTimer);
    window.__toastTimer=setTimeout(()=>t.style.display="none", 900);
  }

  function setBadge(status){
    lastStatus.textContent = status;
    if (status === "OK") lastStatus.className = "badge big ok";
    else if (status === "–") lastStatus.className = "badge big unk";
    else lastStatus.className = "badge big bad";
  }

  function classify(expIso){
    if(!expIso) return "UNKNOWN";
    const today = new Date(); today.setHours(0,0,0,0);
    const expDate = new Date(expIso); expDate.setHours(0,0,0,0);
    if (expDate < today) return "EXPIRED";

    const months = Math.max(0, Math.min(36, parseInt(monthsInput.value||"0",10) || 0));
    const limit = new Date(today);
    limit.setMonth(limit.getMonth() + months);
    if (expDate <= limit) return "EXPIRING";
    return "OK";
  }

  function updateLastUI(){
    lastGtin.textContent = capture?.gtin || "–";
    lastExpiry.textContent = capture?.expiry || "–";
    lastLot.textContent = capture?.lot || "–";
    lastSerial.textContent = capture?.serial || "–";
  }

  function resetCapture(){
    capture = null;
    if (captureTimer) clearTimeout(captureTimer);
    captureTimer = null;
  }

  function startCapture(){
    if (capture) return;
    capture = { gtin:"", expiry:"", lot:"", serial:"" };
    if (captureTimer) clearTimeout(captureTimer);
    captureTimer = setTimeout(() => {
      const hasGtin = !!capture?.gtin;
      const hasDetails = !!(capture?.expiry || capture?.lot || capture?.serial);
      if (hasGtin && !hasDetails) showToast("Alleen GTIN gezien. Houd beide barcodes in beeld en probeer opnieuw.");
      else if (!hasGtin && hasDetails) showToast("Alleen details gezien. Probeer opnieuw met beide barcodes.");
      resetCapture();
      updateLastUI();
      setBadge("–");
    }, CAPTURE_TIMEOUT_MS);
  }

  function commitIfComplete(){
    if (!capture) return;
    const hasGtin = !!capture.gtin;
    const hasDetails = !!(capture.expiry || capture.lot || capture.serial);
    if (!(hasGtin && hasDetails)) return;

    const status = classify(capture.expiry);
    setBadge(status);
    updateLastUI();

    const timestamp = new Date().toISOString();
    const row = { timestamp, gtin: capture.gtin, expiry: capture.expiry, status, lot: capture.lot, serial: capture.serial };
    scanLog.push(row);

    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${timestamp}</td><td>${row.gtin}</td><td>${row.expiry}</td><td>${row.status}</td><td>${row.lot}</td><td>${row.serial}</td>`;
    tbody.prepend(tr);

    exportBtn.disabled = scanLog.length === 0;
    showToast("Artikel gescand, scan de volgende.");
    resetCapture();
  }

  // Robust GS1 normalization/parsing
  function normalizeGs1Text(raw){
    if (!raw) return "";
    let s = String(raw);
    s = s.replace(/^\](C1|c1|d2|D2|Q3|q3|e0|E0)/, ""); // symbology ID
    s = s.replace(/[()\s]/g, ""); // remove parentheses/spaces
    s = s.replace(/<GS>/gi, "\u001d"); // normalize placeholders
    return s;
  }

  function parseGs1(raw){
    const GS = "\u001d";
    const s = normalizeGs1Text(raw);

    const readVariableFrom = (idx) => {
      let out = "", i = idx;
      while (i < s.length) {
        const ch = s[i];
        if (ch === GS) break;
        const next2 = s.slice(i, i+2);
        if (out.length > 0 && ["01","10","11","15","17","21"].includes(next2)) break;
        out += ch; i++;
      }
      return out;
    };

    let gtin="", expiryISO="", lot="", serial="";
    let i=0;
    while(i < s.length){
      if (s[i] === GS) { i++; continue; }
      const ai2 = s.slice(i, i+2);

      if (ai2 === "01") {
        const v = s.slice(i+2, i+16);
        if (/^\d{14}$/.test(v)) gtin = v;
        i += 16; continue;
      }

      if (ai2 === "17" || ai2 === "15" || ai2 === "11") {
        const v = s.slice(i+2, i+8);
        if (/^\d{6}$/.test(v)) {
          const yy=+v.slice(0,2), mm=+v.slice(2,4), dd=+v.slice(4,6);
          const dt = new Date(2000+yy, mm-1, dd);
          if (!Number.isNaN(dt.getTime())) {
            const M=String(dt.getMonth()+1).padStart(2,"0");
            const D=String(dt.getDate()).padStart(2,"0");
            expiryISO = `${dt.getFullYear()}-${M}-${D}`;
          }
        }
        i += 8; continue;
      }

      if (ai2 === "10") {
        const v = readVariableFrom(i+2);
        if (v) lot = v;
        i += 2 + v.length; continue;
      }

      if (ai2 === "21") {
        const v = readVariableFrom(i+2);
        if (v) serial = v;
        i += 2 + v.length; continue;
      }

      i += 1;
    }

    return { gtin, expiryISO, lot, serial };
  }

  function handleDecoded(raw, format){
    const now = Date.now();
    if (raw === lastRaw && (now - lastRawAt) < 180) return;
    lastRaw = raw; lastRawAt = now;

    startCapture();

    // GTIN-only formats (EAN/UPC)
    if (format === "EAN_13" || format === "EAN_8" || format === "UPC_A" || format === "UPC_E") {
      capture.gtin = String(raw);
      updateLastUI();
      setBadge("PENDING_DETAILS");
      // (niet elke keer toasten als je hem stil houdt)
      return;
    }

    // Everything else: try GS1 parse (long Code128 / DataMatrix)
    const parsed = parseGs1(raw);

    if (parsed.gtin) capture.gtin = parsed.gtin;
    if (parsed.expiryISO) capture.expiry = parsed.expiryISO;
    if (parsed.lot) capture.lot = parsed.lot;
    if (parsed.serial) capture.serial = parsed.serial;

    updateLastUI();
    commitIfComplete();
  }

  function downloadCSV(){
    const header=["Timestamp","GTIN","Expiry","Status","Lot","Serial"];
    const rows = scanLog.map(x => header.map(h => {
      const key = h.toLowerCase();
      const v = (x[key] ?? x[h] ?? "");
      const s = String(v);
      return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
    }).join(","));
    const csv=[header.join(","),...rows].join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="scanlog.csv"; a.click();
    URL.revokeObjectURL(url);
  }

  async function applyTorch(on){
    if (!track) return;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (!caps.torch) return;
    await track.applyConstraints({ advanced: [{ torch: !!on }] });
  }

  async function applyZoom(z){
    if (!track) return;
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (!caps.zoom) return;
    const val = Math.max(caps.zoom.min, Math.min(caps.zoom.max, z));
    await track.applyConstraints({ advanced: [{ zoom: val }] });
  }

  async function startStreamWithFallback(){
    const tries = [
      { width: 3840, height: 2160, label: "4K" },
      { width: 1920, height: 1080, label: "1080p" },
      { width: 1280, height: 720,  label: "720p" }
    ];

    for (const t of tries) {
      try {
        const s = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: t.width },
            height: { ideal: t.height }
          },
          audio: false
        });
        camInfo.textContent = `Camera: ${t.label}`;
        return s;
      } catch (e) {
        // try next fallback
      }
    }
    // last resort:
    const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } }, audio:false });
    camInfo.textContent = "Camera: auto";
    return s;
  }

  startBtn.onclick = async () => {
    if (scanning) return;

    try {
      scanning = true;
      startBtn.disabled = true;
      stopBtn.disabled = false;

      // create our own stream (higher chance of DataMatrix success)
      stream = await startStreamWithFallback();
      video.srcObject = stream;
      await video.play();

      track = stream.getVideoTracks()[0];

      // setup torch/zoom UI if supported
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      torchBtn.disabled = !caps.torch;
      zoomSlider.disabled = !caps.zoom;

      if (caps.zoom) {
        zoomSlider.min = caps.zoom.min;
        zoomSlider.max = caps.zoom.max;
        zoomSlider.step = caps.zoom.step || 0.1;
        const settings = track.getSettings ? track.getSettings() : {};
        zoomSlider.value = settings.zoom || caps.zoom.min || 1;
      } else {
        zoomSlider.value = 1;
      }

      // Start ZXing on the video element continuously
      reader.decodeFromVideoElementContinuously(video, (result, err) => {
        if (!scanning) return;
        if (result) handleDecoded(result.getText(), result.getBarcodeFormat().toString());
      });

      showToast("Scanner gestart. Richt op beide barcodes en houd even stil.");
      setBadge("–");
      resetCapture();
    } catch (e) {
      scanning = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      showToast("Start mislukt. Check camera permissies / Safari.");
      console.log(e);
    }
  };

  stopBtn.onclick = async () => {
    scanning = false;
    try { reader.reset(); } catch(e) {}

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }
    stream = null;
    track = null;
    torchOn = false;

    startBtn.disabled = false;
    stopBtn.disabled = true;
    torchBtn.disabled = true;
    zoomSlider.disabled = true;
    camInfo.textContent = "Camera: –";

    resetCapture();
    setBadge("–");
    showToast("Scanner gestopt.");
  };

  torchBtn.onclick = async () => {
    if (!track) return;
    torchOn = !torchOn;
    try {
      await applyTorch(torchOn);
      showToast(torchOn ? "Torch aan" : "Torch uit");
    } catch (e) {
      showToast("Torch niet beschikbaar");
      torchOn = false;
    }
  };

  zoomSlider.oninput = async () => {
    if (!track) return;
    const z = parseFloat(zoomSlider.value);
    try { await applyZoom(z); } catch(e) {}
  };

  clearBtn.onclick = () => {
    scanLog = [];
    tbody.innerHTML = "";
    exportBtn.disabled = true;
    resetCapture();
    lastGtin.textContent="–"; lastExpiry.textContent="–"; lastLot.textContent="–"; lastSerial.textContent="–";
    setBadge("–");
    showToast("Log geleegd");
  };

  exportBtn.onclick = downloadCSV;

  setBadge("–");
})();
</script>

</body>
</html>
